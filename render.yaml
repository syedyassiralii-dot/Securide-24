services:
  - type: web
    name: securide24-frontend
    env: static
    buildCommand: "bash scripts/render-build.sh"
    staticPublishPath: .
    envVars:
      - key: EMAILJS_PUBLIC_KEY
        sync: false
      - key: EMAILJS_SERVICE_ID
        sync: false
      - key: EMAILJS_TEMPLATE_ID
        sync: false
