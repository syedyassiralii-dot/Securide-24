services:
  - type: web
    name: securide24-clone
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NEWSDATA_API_KEY
        sync: false
    headers:
      - path: /assets/**
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /css/**
        name: Cache-Control
        value: public, max-age=604800
      - path: /js/**
        name: Cache-Control
        value: public, max-age=604800
